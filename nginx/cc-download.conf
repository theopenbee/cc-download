# 按 IP 限流：每秒 5 次请求
limit_req_zone $binary_remote_addr zone=cc_download:10m rate=5r/s;

upstream cc_download_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name example.com;  # 替换为实际域名

    # 安全响应头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # 静态二进制文件目录
    location /files/ {
        alias /data/cc-download/;
        autoindex off;

        # 强制浏览器下载而非预览
        add_header Content-Disposition "attachment" always;
        add_header Content-Type application/octet-stream always;

        # 缓存控制 — 利用 ETag 并允许客户端缓存
        etag on;
        add_header Cache-Control "public, max-age=3600" always;

        limit_req zone=cc_download burst=10 nodelay;
    }

    # 下载接口 — 代理到 Go 服务
    location /claude/download {
        proxy_pass http://cc_download_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=cc_download burst=10 nodelay;
    }

    # 健康检查 — 代理到 Go 服务
    location /health {
        proxy_pass http://cc_download_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
