name: Download and Release Claude Code Binaries

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download binaries and verify checksums
        env:
          GCS_BUCKET: https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          PLATFORMS=("darwin-arm64" "darwin-x64" "linux-arm64" "linux-x64" "linux-arm64-musl" "linux-x64-musl")
          DOWNLOAD_DIR="./release-assets"
          mkdir -p "$DOWNLOAD_DIR"

          echo "==> Downloading manifest for version $VERSION..."
          MANIFEST_URL="$GCS_BUCKET/$VERSION/manifest.json"
          curl -fsSL "$MANIFEST_URL" -o "$DOWNLOAD_DIR/manifest.json"
          echo "Manifest downloaded."
          cat "$DOWNLOAD_DIR/manifest.json"

          for PLATFORM in "${PLATFORMS[@]}"; do
            echo ""
            echo "==> Downloading binary for $PLATFORM..."
            BINARY_URL="$GCS_BUCKET/$VERSION/$PLATFORM/claude"
            OUTPUT_FILE="$DOWNLOAD_DIR/claude-${VERSION}-${PLATFORM}"

            curl -fsSL "$BINARY_URL" -o "$OUTPUT_FILE"
            echo "Downloaded: $OUTPUT_FILE"

            echo "==> Verifying checksum for $PLATFORM..."
            EXPECTED_SHA=$(jq -r --arg p "$PLATFORM" '.platforms[$p].sha256' "$DOWNLOAD_DIR/manifest.json")

            if [ -z "$EXPECTED_SHA" ] || [ "$EXPECTED_SHA" = "null" ]; then
              echo "WARNING: No checksum found in manifest for $PLATFORM, skipping verification."
              continue
            fi

            ACTUAL_SHA=$(sha256sum "$OUTPUT_FILE" | awk '{print $1}')

            if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
              echo "ERROR: Checksum mismatch for $PLATFORM!"
              echo "  Expected: $EXPECTED_SHA"
              echo "  Actual:   $ACTUAL_SHA"
              exit 1
            fi

            echo "Checksum verified for $PLATFORM."
          done

          echo ""
          echo "==> All binaries downloaded and verified."
          ls -lh "$DOWNLOAD_DIR"/claude-*

      - name: Generate checksums file
        run: |
          cd ./release-assets
          sha256sum claude-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude Code ${{ steps.version.outputs.version }}
          body: |
            Claude Code binary release for version `${{ steps.version.outputs.version }}`.

            ## Platforms
            - `darwin-arm64` — macOS Apple Silicon
            - `darwin-x64` — macOS Intel
            - `linux-arm64` — Linux ARM64
            - `linux-x64` — Linux x86_64
            - `linux-arm64-musl` — Linux ARM64 (musl/Alpine)
            - `linux-x64-musl` — Linux x86_64 (musl/Alpine)

            ## Usage
            Download the binary for your platform, make it executable, and run:
            ```bash
            chmod +x claude-${{ steps.version.outputs.version }}-<platform>
            ./claude-${{ steps.version.outputs.version }}-<platform>
            ```
          files: |
            ./release-assets/claude-*
            ./release-assets/checksums-sha256.txt
          generate_release_notes: false
